<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASS-CONTROL // Physics Test</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        
        /* ─── CROSSHAIR ─── */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            pointer-events: none; z-index: 10;
            transform: translate(-50%, -50%);
            width: 24px; height: 24px;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        #crosshair::before { width: 2px; height: 14px; left: 11px; top: 5px; }
        #crosshair::after  { width: 14px; height: 2px; left: 5px; top: 11px; }
        #crosshair-dot {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 5px; height: 5px; border-radius: 50%;
            background: white; pointer-events: none; z-index: 11;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s;
            box-shadow: 0 0 6px white;
        }
        #crosshair-dot.aim { 
            transform: translate(-50%, -50%) scale(2.2); 
            background: #00ff00; 
            box-shadow: 0 0 16px #00ff00;
        }
        #crosshair-dot.held { 
            transform: translate(-50%, -50%) scale(1.8); 
            background: #ff00ff; 
            box-shadow: 0 0 12px #ff00ff;
        }

        /* ─── DEBUG & INFO PANELS ─── */
        #debug-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 20, 40, 0.92); color: #00ff00;
            border: 2px solid #00ff0066; padding: 12px 16px;
            pointer-events: none; z-index: 99;
            font-size: 11px; font-family: monospace;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            border-radius: 4px;
        }
        #debug-panel div { margin: 4px 0; letter-spacing: 1px; }
        .dl { color: #00ff8888; }
        .dv { color: #00ffff; font-weight: bold; }
        
        #rank-panel {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-family: monospace;
            pointer-events: none; z-index: 5; font-size: 11px;
            line-height: 1.8;
            background: rgba(0, 20, 40, 0.85); 
            border: 1px solid #00ff0044; 
            padding: 12px 14px;
            backdrop-filter: blur(6px);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.08);
        }
        #rank-panel div { letter-spacing: 1px; margin: 2px 0; }
        
        #ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 136, 0.7); text-align: center;
            pointer-events: none; z-index: 5; font-size: 11px;
            font-family: monospace; letter-spacing: 1px;
            background: rgba(0, 20, 40, 0.75);
            padding: 8px 16px;
            border: 1px solid #00ff0033;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        
        #hold-indicator {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, 50px);
            pointer-events: none; z-index: 10;
            font-family: monospace; font-size: 12px;
            color: #ff00ff; letter-spacing: 2px;
            opacity: 0; transition: opacity 0.2s;
            font-weight: bold;
            text-shadow: 0 0 10px #ff00ff;
        }
        #hold-indicator.visible { opacity: 1; }
        
        /* level-complete removed */
        
        /* ─── EDITOR PANEL ─── */
        #editor-panel {
            position: fixed; right: 20px; top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 20, 50, 0.94); color: #00ff00;
            border: 2px solid #00ff0055; padding: 18px;
            width: 280px; max-height: 80vh; overflow-y: auto;
            pointer-events: auto; z-index: 100;
            font-size: 12px; font-family: monospace;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
            border-radius: 6px;
        }
        #editor-panel h3 { 
            margin: 0 0 12px 0; 
            border-bottom: 2px solid #00ff0044; 
            letter-spacing: 2px; 
            padding-bottom: 8px;
            color: #00ffff;
            font-size: 13px;
        }
        .editor-section {
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #00ff0022;
        }
        .editor-section:last-child {
            border-bottom: none;
        }
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            color: #00ff8899;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #editor-panel button {
            background: rgba(0, 255, 0, 0.08); color: #00ff00; border: 1px solid #00ff0066;
            padding: 8px 10px; margin: 4px 0; cursor: pointer;
            width: 100%; font-family: monospace; font-size: 11px;
            letter-spacing: 0.5px; transition: all 0.15s;
            border-radius: 3px;
        }
        #editor-panel button:hover { 
            background: rgba(0, 255, 0, 0.2);
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            transform: translateX(2px);
        }
        #editor-panel label { 
            display: block; margin: 8px 0 4px; color: #00ff8888; font-size: 11px; letter-spacing: 0.5px; 
        }
        #editor-panel input[type=range] { 
            width: 100%; margin-bottom: 8px; accent-color: #00ff00; cursor: pointer;
        }

        /* ─── SCROLLBAR ─── */
        #editor-panel::-webkit-scrollbar {
            width: 6px;
        }
        #editor-panel::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.05);
        }
        #editor-panel::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.3);
            border-radius: 3px;
        }
        #editor-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 0, 0.5);
        }
        .color-swatch {
            width: 24px; height: 24px; border-radius: 4px;
            cursor: pointer; border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
        }
        .color-swatch:hover { transform: scale(1.2); }
        .color-swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .gun-skin-btn {
            background: rgba(0,255,0,0.08) !important;
            transition: all 0.15s !important;
        }
        .gun-skin-btn.active {
            background: rgba(0,255,0,0.25) !important;
            border-color: #00ff00 !important;
        }
    </style>
</head>
<body>

    <!-- 3D HAND + GUN VIEWMODEL -->
    <canvas id="viewmodel-canvas" style="
        position:fixed; bottom:0; right:0;
        width:520px; height:380px;
        pointer-events:none; z-index:20;
    "></canvas>

    <div id="crosshair"></div>
    <div id="crosshair-dot"></div>
    <div id="hold-indicator">[ HOLDING — SCROLL TO ADJUST DISTANCE ]</div>

    <div id="debug-panel">
        <div><span class="dl">STATE </span><span class="dv" id="debug-state">IDLE</span></div>
        <div><span class="dl">DIST  </span><span class="dv" id="debug-dist">—</span></div>
        <div><span class="dl">SPEED </span><span class="dv" id="debug-speed">—</span></div>
        <div><span class="dl">OBJS  </span><span class="dv" id="debug-objects">0</span></div>
    </div>

    <div id="rank-panel">
        <div>OBJECTS: <span id="obj-count-hud">0</span></div>
        <div>HELD: <span id="held-hud">—</span></div>
    </div>

    <div id="ui">
        WASD MOVE &nbsp;|&nbsp; E EDITOR &nbsp;|&nbsp; CLICK GRAB &nbsp;|&nbsp; RELEASE THROW &nbsp;|&nbsp; SCROLL DISTANCE
    </div>



    <div id="editor-panel" style="display:none;">
        <h3>⚙ EDITOR MODE</h3>
        
        <div class="editor-section">
            <div class="section-title">Create Objects</div>
            <button id="add-box">+ BOX (1×1×1)</button>
            <button id="add-large-box">+ LARGE BOX (2×2)</button>
            <button id="add-sphere">+ SPHERE</button>
            <button id="add-cylinder">+ CYLINDER</button>
            <button id="add-cone">+ CONE</button>
            <button id="add-torus">+ TORUS RING</button>
        </div>

        <div class="editor-section">
            <div class="section-title">Object Color</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;">
                <div class="color-swatch" data-color="#00aaff" style="background:#00aaff;"></div>
                <div class="color-swatch" data-color="#ff5555" style="background:#ff5555;"></div>
                <div class="color-swatch" data-color="#55ff88" style="background:#55ff88;"></div>
                <div class="color-swatch" data-color="#ffaa00" style="background:#ffaa00;"></div>
                <div class="color-swatch" data-color="#aa55ff" style="background:#aa55ff;"></div>
                <div class="color-swatch" data-color="#ff55bb" style="background:#ff55bb;"></div>
                <div class="color-swatch" data-color="#ffffff" style="background:#ffffff;"></div>
                <div class="color-swatch" data-color="#ff3300" style="background:#ff3300;"></div>
            </div>
            <label>Custom: <input type="color" id="custom-color" value="#00aaff" style="width:100%;height:28px;border:none;border-radius:3px;cursor:pointer;background:none;padding:0;"></label>
        </div>

        <div class="editor-section">
            <div class="section-title">Physics Control</div>
            <label>GRAVITY: <span id="gravity-value">9.8</span>m/s²</label>
            <input type="range" id="gravity-slider" min="0" max="50" step="0.1" value="9.8">
            <label>SPAWN MASS: <span id="mass-value">1.0</span>kg</label>
            <input type="range" id="mass-slider" min="0.1" max="10" step="0.1" value="1">
            <label>THROW FORCE: <span id="throw-value">22</span></label>
            <input type="range" id="throw-slider" min="5" max="60" step="1" value="22">
            <label>BOUNCINESS: <span id="bounce-value">0.35</span></label>
            <input type="range" id="bounce-slider" min="0" max="1" step="0.05" value="0.35">
        </div>

        <div class="editor-section">
            <div class="section-title">Gun Skin</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
                <button class="gun-skin-btn" data-skin="default" style="width:48%;font-size:9px;">⬛ TACTICAL</button>
                <button class="gun-skin-btn" data-skin="gold" style="width:48%;font-size:9px;">🟡 GOLD</button>
                <button class="gun-skin-btn" data-skin="chrome" style="width:48%;font-size:9px;">⬜ CHROME</button>
                <button class="gun-skin-btn" data-skin="red" style="width:48%;font-size:9px;">🔴 RED OPS</button>
            </div>
        </div>

        <div class="editor-section">
            <div class="section-title">Actions</div>
            <button id="delete-last">⌫ DELETE LAST</button>
            <button id="clear-all">✕ CLEAR ALL</button>
            <button id="reset-level">↺ RESET LEVEL</button>
            <button id="explode-all" style="color:#ff5555;border-color:#ff555566;">💥 EXPLODE ALL</button>
        </div>

        <div id="object-count" style="color:#00ff8888; margin-top:12px; font-size:11px; text-align:center; letter-spacing:1px; border-top:1px solid #00ff0022; padding-top:10px;">OBJECTS: 0</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ─── PHYSICS WORLD ────────────────────────────────────────
        const world = new CANNON.World();
        world.gravity.set(0, -9.8, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.friction = 0.4;
        world.defaultContactMaterial.restitution = 0.35;

        // ─── SCENE ────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.035);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '1';
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x223344, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(8, 20, 8);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 60;
        sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
        sun.shadow.camera.right = sun.shadow.camera.top = 20;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x334466, 0.6);
        fill.position.set(-6, 6, -4);
        scene.add(fill);

        // ─── FLOOR ────────────────────────────────────────────────
        const floorMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 60, 30, 30),
            new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.9, metalness: 0.1 })
        );
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // Grid overlay for floor
        const grid = new THREE.GridHelper(60, 60, 0x223344, 0x111122);
        grid.position.y = 0.002;
        scene.add(grid);

        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Plane());
        floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(floorBody);

        // ─── WALLS ────────────────────────────────────────────────
        function makeWall(w, h, d, x, y, z) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 })
            );
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 0 });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
            body.position.set(x, y, z);
            world.addBody(body);
        }
        makeWall(40, 10, 0.5,  0,  5, -20); // back
        makeWall(0.5, 10, 40, -20, 5,   0); // left
        makeWall(0.5, 10, 40,  20, 5,   0); // right

        // ─── DYNAMIC OBJECTS ──────────────────────────────────────
        const bodies = [];
        const meshes = [];
        let editorMode = false;
        let currentMass = 1;

        const PALETTE = [0x00aaff, 0xff5555, 0x55ff88, 0xffaa00, 0xaa55ff, 0xff55bb];

        function addDynamicObject(geometry, position, mass, colorHex) {
            const col = colorHex ?? PALETTE[meshes.length % PALETTE.length];
            const mat = new THREE.MeshStandardMaterial({
                color: col,
                emissive: col,
                emissiveIntensity: 0.12,
                roughness: 0.4,
                metalness: 0.3,
            });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.copy(position);
            scene.add(mesh);
            meshes.push(mesh);

            let shape;
            const p = geometry.parameters;
            if (geometry.type === 'BoxGeometry')
                shape = new CANNON.Box(new CANNON.Vec3(p.width / 2, p.height / 2, p.depth / 2));
            else if (geometry.type === 'SphereGeometry')
                shape = new CANNON.Sphere(p.radius);
            else if (geometry.type === 'CylinderGeometry')
                shape = new CANNON.Cylinder(p.radiusTop, p.radiusBottom, p.height, 12);

            const body = new CANNON.Body({ mass, shape, linearDamping: 0.12, angularDamping: 0.4 });
            body.position.copy(position);
            world.addBody(body);
            bodies.push(body);

            return { mesh, body };
        }

        // ─── LEVEL LOADING ────────────────────────────────────────
        function resetScene() {
            releaseObject();
            for (let i = meshes.length - 1; i >= 0; i--) {
                scene.remove(meshes[i]);
                world.removeBody(bodies[i]);
            }
            meshes.length = 0;
            bodies.length = 0;
            // Spawn a handful of starter objects
            const cols = [0x00aaff, 0xff5544, 0x44ffaa, 0xffcc00, 0xaa44ff];
            for (let i = 0; i < 5; i++) {
                const pos = new THREE.Vector3((i - 2) * 2.5, 3, -6);
                const pick = i % 3;
                if (pick === 0) addDynamicObject(new THREE.BoxGeometry(1,1,1), pos, 1, cols[i]);
                else if (pick === 1) addDynamicObject(new THREE.SphereGeometry(0.55, 16, 16), pos, 1, cols[i]);
                else addDynamicObject(new THREE.CylinderGeometry(0.4,0.4,1.2,10), pos, 1, cols[i]);
            }
        }

        // ─── UI ───────────────────────────────────────────────────
        function updateHUD() {
            document.getElementById('obj-count-hud').textContent = meshes.length;
            document.getElementById('held-hud').textContent = heldObject ? 'YES' : '—';
            document.getElementById('debug-objects').textContent = meshes.length;
            document.getElementById('object-count').textContent = 'OBJECTS: ' + meshes.length;
            document.getElementById('debug-state').textContent =
                heldObject ? '⚔ HOLDING' : isLooking ? '◯ AIMING' : 'IDLE';
            if (heldObject) {
                const d = camera.position.distanceTo(heldObject.mesh.position).toFixed(2);
                const v = heldObject.body.velocity.length().toFixed(2);
                document.getElementById('debug-dist').textContent = d + 'm';
                document.getElementById('debug-speed').textContent = v + 'm/s';
            } else {
                document.getElementById('debug-dist').textContent = '—';
                document.getElementById('debug-speed').textContent = '—';
            }
        }

        function burstSpawn() {
            const count = 4 + Math.floor(Math.random() * 4);
            const BURST_PALETTE = [0x00aaff, 0xff5555, 0x55ff88, 0xffaa00, 0xaa55ff, 0xff55bb, 0xff3300, 0x00ffcc];
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (meshes.length >= 18) return;
                    const col = BURST_PALETTE[Math.floor(Math.random() * BURST_PALETTE.length)];
                    const x = (Math.random() - 0.5) * 12;
                    const z = -3 - Math.random() * 8;
                    const y = 4 + Math.random() * 5;
                    const pos = new THREE.Vector3(x, y, z);
                    const mass = 0.5 + Math.random() * 2;
                    const pick = Math.floor(Math.random() * 4);
                    if (pick === 0) addDynamicObject(new THREE.BoxGeometry(0.6+Math.random()*0.8, 0.6+Math.random()*0.8, 0.6+Math.random()*0.8), pos, mass, col);
                    else if (pick === 1) addDynamicObject(new THREE.SphereGeometry(0.3+Math.random()*0.5, 16, 16), pos, mass, col);
                    else if (pick === 2) addDynamicObject(new THREE.CylinderGeometry(0.3, 0.3, 1+Math.random(), 10), pos, mass, col);
                    else addDynamicObject(new THREE.ConeGeometry(0.35+Math.random()*0.3, 1+Math.random(), 10), pos, mass, col);
                }, i * 180);
            }
        }

        // ─── CONTROLS ────────────────────────────────────────────
        const controls = new PointerLockControls(camera, document.body);
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        document.addEventListener('click', () => {
            if (!editorMode && !controls.isLocked) controls.lock();
        });

        document.addEventListener('keydown', e => {
            if (e.code === 'KeyW') moveForward  = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft      = true;
            if (e.code === 'KeyD') moveRight     = true;
            if (e.code === 'KeyE') {
                editorMode = !editorMode;
                document.getElementById('editor-panel').style.display = editorMode ? 'block' : 'none';
                if (editorMode && controls.isLocked) controls.unlock();
            }
        });
        document.addEventListener('keyup', e => {
            if (e.code === 'KeyW') moveForward  = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft      = false;
            if (e.code === 'KeyD') moveRight     = false;
        });

        // ─── PORTAL-STYLE GRAVITY GUN ─────────────────────────────
        //
        // How Portal's Gravity Gun works:
        //   1. Click: Raycast. If you hit something, smoothly PULL it toward
        //      a "carry point" in front of the camera (spring physics, not teleport).
        //   2. While held: The object floats at carry point, damped so it follows
        //      your look without clipping. Object can still rotate naturally.
        //   3. Scroll: Adjust carry distance.
        //   4. Release: The object inherits your camera's look direction × throw force.
        //
        // Key differences from original code:
        //   - Uses spring/force approach instead of teleporting body.position
        //   - Mass is NEVER zeroed — we apply impulses each frame
        //   - Throw velocity computed from camera direction on release
        //   - Hold distance adjustable with scroll
        //   - Smooth pickup arc (object travels toward you over ~0.3s)
        //   - Crosshair changes based on what you're aiming at / holding

        const HOLD_DIST_DEFAULT = 3.5;
        const HOLD_DIST_MIN = 1.5;
        const HOLD_DIST_MAX = 6.0;
        const SPRING_STIFFNESS = 160;   // Higher = snappier pull  (Portal is ~150-200)
        const SPRING_DAMPING   = 18;    // Higher = less oscillation
        const MAX_GRAB_RANGE   = 8.0;   // Max distance to grab from
        let THROW_FORCE        = 22;    // m/s on release (overridden by slider)

        let heldObject    = null;   // { mesh, body, origMass, origLinearDamp, origAngularDamp }
        let holdDistance  = HOLD_DIST_DEFAULT;
        let isLooking     = false;  // crosshair is over a grabbable object

        const raycaster   = new THREE.Raycaster();
        const _camDir     = new THREE.Vector3();
        const _targetPos  = new THREE.Vector3();
        const _delta      = new THREE.Vector3();
        const _force      = new CANNON.Vec3();
        const _impulse    = new CANNON.Vec3();

        // Track last camera velocity for throw
        const _prevCamPos  = new THREE.Vector3();
        const _camVelocity = new THREE.Vector3();

        function grabObject(mesh) {
            const idx = meshes.indexOf(mesh);
            if (idx < 0) return;
            if (heldObject && heldObject.mesh === mesh) return;
            if (heldObject) releaseObject(false); // drop old one silently

            const body = bodies[idx];
            heldObject = {
                mesh,
                body,
                origMass:          body.mass,
                origLinearDamp:    body.linearDamping,
                origAngularDamp:   body.angularDamping,
            };

            window._vmHeldObject = heldObject;
            window._vmIsLooking  = isLooking;
            renderer.render(scene, camera);

                pivot.position.set(0, 0, -len * 0.5);
                const seg = makeSegment(len, 0.025, mat);
                seg.position.set(0, 0, 0);
                pivot.add(seg);

                // Knuckle ridge
                const knuckle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.014, 8, 8), mat);
                knuckle.position.set(0, 0, -len * 0.5);
                pivot.add(knuckle);

                // Nail on last segment
                if(i === segLens.length - 1) {
                    const nail = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.006, 0.018), nailMat);
                    nail.position.set(0, 0.016, -0.008);
                    pivot.add(nail);
                }

                current.add(pivot);
                pivot.rotation.x = curls[i] || 0;
                current = pivot;
            });
            return g;
        }

        // Grip fingers (curled around grip) — positioned on sides of grip
        // Index finger — partially extended, resting near trigger guard
        makeFinger(0.09, 0.01, -0.11, [0.04, 0.035, 0.028], [0.4, 0.8, 0.7], handMat);
        makeFinger(-0.09, 0.01, -0.11, [0.04, 0.035, 0.028], [0.4, 0.8, 0.7], handMat);

        // Middle finger
        makeFinger(0.09, 0.01, -0.06, [0.045, 0.038, 0.030], [1.4, 1.3, 1.1], handMat);
        makeFinger(-0.09, 0.01, -0.06, [0.045, 0.038, 0.030], [1.4, 1.3, 1.1], handMat);

        // Ring finger
        makeFinger(0.09, 0.01, -0.01, [0.04, 0.034, 0.026], [1.5, 1.3, 1.0], handMat);
        makeFinger(-0.09, 0.01, -0.01, [0.04, 0.034, 0.026], [1.5, 1.3, 1.0], handMat);

        // Pinky
        makeFinger(0.09, 0.01, 0.04, [0.032, 0.026, 0.020], [1.4, 1.2, 0.9], handMat);
        makeFinger(-0.09, 0.01, 0.04, [0.032, 0.026, 0.020], [1.4, 1.2, 0.9], handMat);

        // Thumb — wrapped around left side of grip
        const thumbG = new THREE.Group();
        thumbG.position.set(0.095, 0.01, -0.06);
        handGroup.add(thumbG);
        const thumbSeg1 = new THREE.Group();
        thumbSeg1.rotation.z = -0.5;
        thumbSeg1.rotation.x = -0.3;
        const ts1 = makeSegment(0.045, 0.030, handMat);
        ts1.position.set(0.02, 0, 0);
        thumbSeg1.add(ts1);
        const thumbSeg2 = new THREE.Group();
        thumbSeg2.position.set(0.04, 0, 0);
        thumbSeg2.rotation.z = -0.4;
        const ts2 = makeSegment(0.038, 0.026, handMat);
        ts2.position.set(0.018, 0, 0);
        thumbSeg2.add(ts2);
        const tnail = new THREE.Mesh(new THREE.BoxGeometry(0.006, 0.018, 0.018), nailMat);
        tnail.position.set(0.033, 0.012, 0);
        thumbSeg2.add(tnail);
        thumbSeg1.add(thumbSeg2);
        thumbG.add(thumbSeg1);

        // Position entire viewmodel in view-space
        // The gun sits bottom-right, hand wraps grip
        const VM_POS = new THREE.Vector3(0.28, -0.26, -0.75);
        const VM_ROT = new THREE.Euler(-0.08, -0.18, 0.04);

        gunGroup.position.copy(VM_POS);
        gunGroup.rotation.copy(VM_ROT);

        handGroup.position.set(VM_POS.x - 0.0, VM_POS.y - 0.06, VM_POS.z + 0.05);
        handGroup.rotation.copy(VM_ROT);

        // ── MUZZLE FLASH ────────────────────────────────
        const flashLight = new THREE.PointLight(0xff8800, 0, 3);
        flashLight.position.set(0.28, -0.22, -1.05);
        scene.add(flashLight);
        const flashSprite = new THREE.Mesh(
            new THREE.PlaneGeometry(0.1, 0.1),
            new THREE.MeshBasicMaterial({ color:0xffcc44, transparent:true, opacity:0, side:THREE.DoubleSide })
        );
        flashSprite.position.set(0.28, -0.22, -1.02);
        scene.add(flashSprite);

        // ── BRASS EJECTION PARTICLES ─────────────────────
        const shellGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.016, 6);
        const shellMat = new THREE.MeshStandardMaterial({ color:0xcc8800, roughness:0.3, metalness:0.9 });
        const shells = [];
        function spawnShell() {
            const s = new THREE.Mesh(shellGeo, shellMat);
            s.position.set(0.18, -0.19, -0.72);
            s.velocity = new THREE.Vector3(
                0.8 + Math.random()*0.4,
                0.5 + Math.random()*0.5,
                -(Math.random()*0.3)
            );
            s.angularV = new THREE.Vector3(
                (Math.random()-0.5)*20,
                (Math.random()-0.5)*20,
                (Math.random()-0.5)*20
            );
            s.life = 1.0;
            scene.add(s);
            shells.push(s);
        }

        // ── SKIN SWITCHER ────────────────────────────────
        window.viewmodelSetSkin = (name) => {
            currentSkin = name;
            const S2 = skinMats[name] || skinMats.default;
            // Update gun part materials
            gunGroup.traverse(child => {
                if(!child.isMesh) return;
                // Only replace gun metal parts, not grip
                const m = child.material;
                if(m === skinMats.default.slide || m === skinMats.gold.slide || m === skinMats.chrome.slide || m === skinMats.red.slide) child.material = S2.slide;
                else if(m === skinMats.default.gun || m === skinMats.gold.gun || m === skinMats.chrome.gun || m === skinMats.red.gun) child.material = S2.gun;
                else if(m === skinMats.default.barrel || m === skinMats.gold.barrel || m === skinMats.chrome.barrel || m === skinMats.red.barrel) child.material = S2.barrel;
                else if(m === skinMats.default.accent || m === skinMats.gold.accent || m === skinMats.chrome.accent || m === skinMats.red.accent) child.material = S2.accent;
                else if(m === skinMats.default.grip || m === skinMats.gold.grip || m === skinMats.chrome.grip || m === skinMats.red.grip) child.material = S2.grip;
            });
        };

        // ── ANIMATION STATE ──────────────────────────────
        let isAiming = false;
        let isHolding = false;
        let isFiring = false;
        let fireRecoil = 0;
        let recoilReturn = 0;
        let idleT = 0;
        let walkT = 0;
        let lastFireTime = 0;

        // Slide reciprocation
        let slideRecoil = 0;

        // Bob / idle / walk
        const idleBob  = { x:0, y:0 };
        const walkBob  = { x:0, y:0 };
        const aimLerp  = { v:0 };
        const holdLerp = { v:0 };

        // ── FIRE TRIGGER ─────────────────────────────────
        // Listen for clicks on main page
        document.addEventListener('mousedown', (e) => {
            if(e.button !== 0) return;
            // Fire only when pointer is locked (in game)
            if(document.pointerLockElement) {
                triggerFire();
            }
        });
        document.addEventListener('mouseup', () => {
            // second click throws — also fire
        });

        function triggerFire() {
            const now = Date.now();
            if(now - lastFireTime < 120) return; // ROF limit
            lastFireTime = now;
            isFiring = true;
            fireRecoil = 1.0;
            slideRecoil = 1.0;
            spawnShell();
            // Flash
            flashLight.intensity = 8;
            flashSprite.material.opacity = 0.9;
            setTimeout(() => {
                flashLight.intensity = 0;
                flashSprite.material.opacity = 0;
            }, 55);
        }

        const clock2 = new THREE.Clock();

        function vmAnimate() {
            requestAnimationFrame(vmAnimate);
            const dt = Math.min(clock2.getDelta(), 0.05);
            idleT += dt;
            walkT += dt * 2.5;

            // Detect state from main page globals
            const mainHeld = !!window._vmHeldObject;
            const mainAim  = !!window._vmIsLooking;
            aimLerp.v  += (mainAim  ? 1 : 0 - aimLerp.v)  * dt * 8;
            holdLerp.v += (mainHeld ? 1 : 0 - holdLerp.v) * dt * 6;

            // Idle sway
            const idleSwayX = Math.sin(idleT * 0.7)  * 0.003;
            const idleSwayY = Math.sin(idleT * 0.5)  * 0.002;
            const idleSwayZ = Math.sin(idleT * 0.35) * 0.001;

            // Walk bob (simulate from elapsed time as proxy)
            const walkBobX = Math.sin(walkT) * 0.006;
            const walkBobY = Math.abs(Math.sin(walkT)) * 0.004;

            // Recoil decay
            fireRecoil  *= Math.pow(0.02, dt);
            slideRecoil *= Math.pow(0.04, dt);
            if(fireRecoil < 0.001) { fireRecoil = 0; isFiring = false; }

            // Aim-in: bring gun up/left and in-z
            const aimX =  aimLerp.v * -0.22;
            const aimY =  aimLerp.v *  0.19;
            const aimZ =  aimLerp.v *  0.20;

            // Hold tilt: tip barrel up slightly when holding
            const holdTilt = holdLerp.v * 0.08;

            // Apply to gun group
            const baseX = VM_POS.x + idleSwayX + walkBobX + aimX;
            const baseY = VM_POS.y + idleSwayY + walkBobY + aimY;
            const baseZ = VM_POS.z + idleSwayZ + aimZ;

            gunGroup.position.set(
                baseX - fireRecoil * 0.015,
                baseY + fireRecoil * 0.02,
                baseZ + fireRecoil * 0.08
            );
            gunGroup.rotation.set(
                VM_ROT.x - fireRecoil * 0.18 - holdTilt,
                VM_ROT.y + idleSwayX * 2,
                VM_ROT.z + idleSwayY * 1.5
            );

            handGroup.position.set(
                baseX - 0.0  - fireRecoil * 0.012,
                baseY - 0.06 + fireRecoil * 0.015,
                baseZ + 0.05 + fireRecoil * 0.06
            );
            handGroup.rotation.set(
                VM_ROT.x - fireRecoil * 0.15 - holdTilt,
                VM_ROT.y + idleSwayX * 2,
                VM_ROT.z + idleSwayY * 1.5
            );

            // Slide reciprocation (eject on fire)
            slide.position.z = -slideRecoil * 0.06;

            // Update shells
            for(let i = shells.length - 1; i >= 0; i--) {
                const s = shells[i];
                s.life -= dt * 1.2;
                s.position.addScaledVector(s.velocity, dt);
                s.velocity.y -= 1.5 * dt;
                s.rotation.x += s.angularV.x * dt;
                s.rotation.y += s.angularV.y * dt;
                s.rotation.z += s.angularV.z * dt;
                s.material.opacity = s.life;
                if(s.life <= 0) {
                    scene.remove(s);
                    shells.splice(i, 1);
                }
            }

            // Emissive pulse on hold
            if(holdLerp.v > 0.1) {
                const pulse = 0.3 + Math.sin(Date.now()*0.006)*0.15;
                rimLight.color.setHex(0xff00ff);
                rimLight.intensity = 1.2 + pulse;
            } else {
                rimLight.color.setHex(0x00ffcc);
                rimLight.intensity = 1.2;
            }

            renderer.render(scene, camera);
        }
        vmAnimate();

        // Expose state bridge for viewmodel to read from main game
        setInterval(() => {
            // Peek at global game state via window (set below)
        }, 16);
    </script>

    <script type="module">
        // Bridge: expose heldObject and isLooking to viewmodel
        // We poll the module scope via a shared namespace trick
        // The main game script exposes these after animate() via window
        const orig = window.requestAnimationFrame;
        // Just bridge after a tick
    </script>
</body>
